name: Destroy test environment

on:
  workflow_dispatch:
    inputs:
      resource_group_name:
        description: Azure resource group to delete
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete resource group
        run: |
          az group delete \
            --name "${{ inputs.resource_group_name }}" \
            --yes \
            --no-wait false

      - name: Summarize deletion
        run: |
          {
            echo "## Test environment deleted"
            echo ""
            echo "- Resource group: ${{ inputs.resource_group_name }}"
          } >> "$GITHUB_STEP_SUMMARY"
